<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background:#0f0f0f;
      color:white;
      padding:20px;
    }

    input {
      width:100%;
      padding:12px;
      margin:6px 0;
      border-radius:10px;
      border:none;
      background:#1f1f1f;
      color:white;
    }

    .upload-box {
      border:2px dashed #555;
      padding:20px;
      text-align:center;
      cursor:pointer;
      border-radius:10px;
    }

    #preview {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    #preview img {
      width:80px;
      height:80px;
      object-fit:cover;
      border-radius:8px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:10px;
      width:100%;
      background:#ffcc00;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="category" placeholder="Kategori">

<div class="upload-box" id="uploadBox">
  Klik atau drag gambar
  <input type="file" id="imageFile" multiple style="display:none;">
</div>

<div id="preview"></div>

<button onclick="addProduct()">Add Product</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let files = [];

const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

uploadBox.onclick = () => fileInput.click();

fileInput.onchange = e => handleFiles(e.target.files);

uploadBox.ondrop = e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

uploadBox.ondragover = e => e.preventDefault();

function handleFiles(selected){
  files = [...selected];
  preview.innerHTML = "";

  files.forEach(file=>{
    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

// compress
function compressImage(file){
  return new Promise(resolve=>{
    let img = new Image();
    let reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = ()=>{
      let canvas = document.createElement("canvas");
      let ctx = canvas.getContext("2d");

      let scale = 800 / img.width;
      canvas.width = 800;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      canvas.toBlob(blob=>resolve(blob),"image/jpeg",0.7);
    };

    reader.readAsDataURL(file);
  });
}

async function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;

  if(!name || !price || files.length===0){
    alert("Isi semua");
    return;
  }

  let imageUrls = [];

  for(let i=0;i<files.length;i++){

    let compressed = await compressImage(files[i]);

    let base64 = await blobToBase64(compressed);

    let formData = new FormData();
    formData.append("image", base64.split(',')[1]);

    let res = await fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4",{
      method:"POST",
      body:formData
    });

    let data = await res.json();

    imageUrls.push(data.data.url);
  }

  db.collection("products").add({
    name, price, category, images:imageUrls
  }).then(()=>{
    alert("Produk tambah!");
    location.reload();
  });
}

function blobToBase64(blob){
  return new Promise(resolve=>{
    let reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}
</script>

</body>
</html>
