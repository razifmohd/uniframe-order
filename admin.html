<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: none;
      background: #1f1f1f;
      color: white;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn { background: #ffcc00; color: black; }
    .update-btn { background: #00c853; color: white; }
    .edit-btn { background: #2196f3; color: white; }
    .delete-btn { background: #e53935; color: white; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: #ffcc00;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Tambah / Edit Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="category" placeholder="Kategori">
<input type="file" id="imageFile">

<button class="add-btn" onclick="addProduct()">Add Product</button>
<button class="update-btn" onclick="updateProduct()">Update Product</button>

<hr>

<h3>Senarai Produk</h3>
<div id="productList" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order",
  storageBucket: "uniframe-order.firebasestorage.app",
  messagingSenderId: "616815976328",
  appId: "1:616815976328:web:4ba41c34762969f4f4a43d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;

// 🔥 ADD PRODUCT (IMG BB UPLOAD)
function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;
  let file = document.getElementById("imageFile").files[0];

  if(!name || !price || !category || !file){
    alert("Isi semua field!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(){
    let base64 = reader.result.split(',')[1];

    let formData = new FormData();
    formData.append("image", base64);

    fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {

      let imageUrl = data.data.url;

      db.collection("products").add({
        name,
        price,
        category,
        image: imageUrl,
        active: true
      }).then(() => {
        alert("Produk tambah!");
        clearForm();
        loadProducts();
      });

    });
  };

  reader.readAsDataURL(file);
}

// 🔥 LOAD PRODUCT
function loadProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  db.collection("products").get().then(snapshot => {
    snapshot.forEach(doc => {
      let p = doc.data();

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <div>${p.category}</div>
        <div class="price">RM${p.price}</div>

        <button class="edit-btn" onclick="editProduct('${doc.id}', '${p.name}', ${p.price}, '${p.image}', '${p.category}')">Edit</button>
        <button class="delete-btn" onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

// 🔥 DELETE
function deleteProduct(id){
  db.collection("products").doc(id).delete().then(loadProducts);
}

// 🔥 EDIT
function editProduct(id, name, price, image, category){
  editId = id;

  document.getElementById("name").value = name;
  document.getElementById("price").value = price;
  document.getElementById("category").value = category;
}

// 🔥 UPDATE
function updateProduct(){
  if(!editId){
    alert("Klik EDIT dulu!");
    return;
  }

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;

  db.collection("products").doc(editId).update({
    name, price, category
  }).then(() => {
    editId = null;
    clearForm();
    loadProducts();
  });
}

// 🔥 CLEAR
function clearForm(){
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
  document.getElementById("imageFile").value = "";
}

loadProducts();
</script>

</body>
</html>
