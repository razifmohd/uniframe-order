<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h2{ margin-top:30px; }

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  width:100%;
  background:#ffcc00;
  font-weight:bold;
}

.upload-box{
  border:2px dashed #555;
  padding:20px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

#preview img{
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

.preview-item{
  display:inline-block;
  text-align:center;
}

.preview-item button{
  width:auto;
  padding:3px 6px;
  font-size:12px;
  background:red;
  margin-top:2px;
}

.product, .order{
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:60px;
  height:60px;
  object-fit:cover;
  margin:3px;
  border-radius:6px;
}

.delete{ background:red; }
.edit{ background:#00c3ff; }
.status{ background:#444; }
</style>
</head>

<body>

<h1>ADMIN PANEL</h1>

<h2>Tambah / Edit Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="desc" placeholder="Description">

<div class="upload-box" id="uploadBox">
  Klik atau drag gambar
  <input type="file" id="fileInput" multiple hidden>
</div>

<div id="preview"></div>

<button onclick="addProduct()" id="submitBtn">Add Product</button>

<hr>

<h2>Produk</h2>
<div id="productList"></div>

<hr>

<h2>Orders</h2>
<div id="orderList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let files=[];
let editId=null;
let currentImages=[];

const nameInput=document.getElementById("name");
const priceInput=document.getElementById("price");
const descInput=document.getElementById("desc");
const submitBtn=document.getElementById("submitBtn");

/* ================= UPLOAD ================= */
const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=e=>handleFiles(e.target.files);

uploadBox.ondrop=e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

uploadBox.ondragover=e=>e.preventDefault();

function handleFiles(selected){
  files=[...selected];

  files.forEach(file=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

/* ================= ADD / UPDATE ================= */
async function addProduct(){

  let name=nameInput.value;
  let price=parseInt(priceInput.value);
  let desc=descInput.value;

  let imageUrls=[];

  if(files.length>0){
    for(let f of files){
      let formData=new FormData();
      formData.append("image",f);

      let res=await fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4",{
        method:"POST",
        body:formData
      });

      let data=await res.json();
      imageUrls.push(data.data.url);
    }
  }

  if(editId){
    let finalImages=[...currentImages,...imageUrls];

    await db.collection("products").doc(editId).update({
      name, price, description:desc, images:finalImages
    });

    editId=null;
    currentImages=[];
    submitBtn.innerText="Add Product";

  }else{
    await db.collection("products").add({
      name, price, description:desc, images:imageUrls
    });
  }

  alert("Saved!");
  location.reload();
}

/* ================= LOAD PRODUCT ================= */
function loadProducts(){
  productList.innerHTML="";

  db.collection("products").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let p=doc.data();

      let div=document.createElement("div");
      div.className="product";

      div.innerHTML=`
        <b>${p.name}</b> - RM${p.price}<br>
        ${p.images?.map(img=>`<img src="${img}">`).join("")}
      `;

      // 🔥 EDIT BUTTON (NO INLINE BUG)
      let editBtn=document.createElement("button");
      editBtn.className="edit";
      editBtn.innerText="Edit";

      editBtn.onclick=()=>{
        editProduct(doc.id,p);
      };

      // 🔥 DELETE
      let delBtn=document.createElement("button");
      delBtn.className="delete";
      delBtn.innerText="Delete";
      delBtn.onclick=()=>deleteProduct(doc.id);

      div.appendChild(editBtn);
      div.appendChild(delBtn);

      productList.appendChild(div);
    });
  });
}

/* ================= EDIT ================= */
function editProduct(id,p){

  nameInput.value=p.name;
  priceInput.value=p.price;
  descInput.value=p.description || "";

  editId=id;
  currentImages=[...(p.images||[])];
  files=[];

  renderPreview();

  submitBtn.innerText="Update Product";
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ================= PREVIEW ================= */
function renderPreview(){
  preview.innerHTML="";

  currentImages.forEach((img,i)=>{
    let div=document.createElement("div");
    div.className="preview-item";

    div.innerHTML=`
      <img src="${img}">
      <br>
      <button onclick="removeImage(${i})">❌</button>
    `;

    preview.appendChild(div);
  });
}

function removeImage(index){
  currentImages.splice(index,1);
  renderPreview();
}

/* DELETE */
function deleteProduct(id){
  if(confirm("Delete?")){
    db.collection("products").doc(id).delete().then(loadProducts);
  }
}

/* ================= ORDERS ================= */
function loadOrders(){
  orderList.innerHTML="";

  db.collection("orders").orderBy("time","desc").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let o=doc.data();

      let items=o.items?.map(i=>`- ${i.name} RM${i.price}`).join("<br>");

      let div=document.createElement("div");
      div.className="order";

      div.innerHTML=`
        <b>${o.name}</b><br>
        ${o.phone}<br>
        ${o.address}<br><br>
        ${items}<br><br>
        Total: RM${o.total}<br>
        Status: ${o.status || "pending"}<br>
      `;

      let paidBtn=document.createElement("button");
      paidBtn.innerText="Paid";
      paidBtn.className="status";
      paidBtn.onclick=()=>updateStatus(doc.id,"paid");

      let doneBtn=document.createElement("button");
      doneBtn.innerText="Done";
      doneBtn.className="status";
      doneBtn.onclick=()=>updateStatus(doc.id,"done");

      div.appendChild(paidBtn);
      div.appendChild(doneBtn);

      orderList.appendChild(div);
    });
  });
}

function updateStatus(id,status){
  db.collection("orders").doc(id).update({status}).then(loadOrders);
}

/* INIT */
loadProducts();
loadOrders();
</script>

</body>
</html>
