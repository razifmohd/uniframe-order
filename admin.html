<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: none;
      background: #1f1f1f;
      color: white;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn { background: #ffcc00; color: black; }
    .update-btn { background: #00c853; color: white; }

    .upload-box {
      border: 2px dashed #555;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      margin-top: 10px;
    }

    #preview {
      display: none;
      margin-top: 10px;
      max-width: 100%;
      border-radius: 10px;
    }

    #progressBox {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="category" placeholder="Kategori">

<div class="upload-box" id="uploadBox">
  Drag & Drop gambar atau klik sini
  <input type="file" id="imageFile" style="display:none;">
  <img id="preview">
</div>

<div id="progressBox">
  <div style="background:#333; border-radius:10px;">
    <div id="progressBar" style="height:10px; width:0%; background:#ffcc00;"></div>
  </div>
</div>

<button class="add-btn" onclick="addProduct()">Add Product</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedFile = null;

// DRAG DROP
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

uploadBox.onclick = () => fileInput.click();

fileInput.onchange = e => handleFile(e.target.files[0]);

uploadBox.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

function handleFile(file){
  selectedFile = file;

  let reader = new FileReader();
  reader.onload = function(e){
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// 🔥 COMPRESS + RESIZE
function compressImage(file, callback){
  let img = new Image();
  let reader = new FileReader();

  reader.onload = function(e){
    img.src = e.target.result;
  };

  img.onload = function(){
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    let maxWidth = 800;
    let scale = maxWidth / img.width;

    canvas.width = maxWidth;
    canvas.height = img.height * scale;

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(function(blob){
      callback(blob);
    }, "image/jpeg", 0.7);
  };

  reader.readAsDataURL(file);
}

// ADD PRODUCT
function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;

  if(!name || !price || !category || !selectedFile){
    alert("Isi semua field!");
    return;
  }

  document.getElementById("progressBox").style.display = "block";

  compressImage(selectedFile, function(compressedBlob){

    let reader = new FileReader();

    reader.onload = function(){
      let base64 = reader.result.split(',')[1];

      let formData = new FormData();
      formData.append("image", base64);

      let xhr = new XMLHttpRequest();

      xhr.open("POST", "https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4");

      xhr.upload.onprogress = function(e){
        let percent = (e.loaded / e.total) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
      };

      xhr.onload = function(){
        let data = JSON.parse(xhr.responseText);
        let imageUrl = data.data.url;

        db.collection("products").add({
          name, price, category, image: imageUrl
        }).then(() => {
          alert("Produk tambah!");
          location.reload();
        });
      };

      xhr.send(formData);
    };

    reader.readAsDataURL(compressedBlob);
  });
}
</script>

</body>
</html>
