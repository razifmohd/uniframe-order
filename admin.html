<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  width:100%;
  background:#ffcc00;
  font-weight:bold;
}

.upload-box{
  border:2px dashed #555;
  padding:20px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

#preview img{
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

.product{
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.delete{
  background:red;
}

.edit{
  background:#00c3ff;
  margin-bottom:5px;
}
</style>
</head>

<body>

<h2>Tambah / Edit Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="desc" placeholder="Description">

<div class="upload-box" id="uploadBox">
  Klik atau drag gambar
  <input type="file" id="fileInput" multiple hidden>
</div>

<div id="preview"></div>

<button onclick="addProduct()" id="submitBtn">Add Product</button>

<hr>

<h3>Produk</h3>
<div id="productList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let files=[];
let editId=null; // 🔥 track edit mode

const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=e=>handleFiles(e.target.files);

uploadBox.ondrop=e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

uploadBox.ondragover=e=>e.preventDefault();

function handleFiles(selected){
  files=[...selected];
  preview.innerHTML="";

  files.forEach(file=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

/* 🔥 ADD / UPDATE PRODUCT */
async function addProduct(){

  let name=document.getElementById("name").value;
  let price=parseInt(document.getElementById("price").value);
  let desc=document.getElementById("desc").value;

  if(!name || !price){
    alert("Isi semua");
    return;
  }

  let imageUrls=[];

  // 🔥 kalau ada upload baru → upload
  if(files.length > 0){
    for(let i=0;i<files.length;i++){

      let formData=new FormData();
      formData.append("image",files[i]);

      let res=await fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4",{
        method:"POST",
        body:formData
      });

      let data=await res.json();
      imageUrls.push(data.data.url);
    }
  }

  if(editId){
    // 🔥 UPDATE MODE
    let updateData={
      name,
      price,
      description:desc
    };

    if(imageUrls.length > 0){
      updateData.images=imageUrls; // replace gambar kalau ada upload baru
    }

    await db.collection("products").doc(editId).update(updateData);

    editId=null;
    document.getElementById("submitBtn").innerText="Add Product";

  }else{
    // 🔥 ADD MODE
    if(imageUrls.length===0){
      alert("Upload gambar dulu");
      return;
    }

    await db.collection("products").add({
      name,
      price,
      description:desc,
      images:imageUrls
    });
  }

  alert("Saved!");
  location.reload();
}

/* 🔥 LOAD PRODUK */
function loadProducts(){
  const list=document.getElementById("productList");
  list.innerHTML="";

  db.collection("products").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let p=doc.data();

      let div=document.createElement("div");
      div.className="product";

      div.innerHTML=`
        <b>${p.name}</b> - RM${p.price}<br>
        ${p.images ? p.images.map(img=>`<img src="${img}">`).join("") : ""}

        <button class="edit" onclick="editProduct('${doc.id}','${p.name}',${p.price},'${p.description || ""}')">Edit</button>
        <button class="delete" onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

/* 🔥 EDIT FUNCTION */
function editProduct(id,name,price,desc){

  document.getElementById("name").value=name;
  document.getElementById("price").value=price;
  document.getElementById("desc").value=desc;

  preview.innerHTML=""; // kosongkan preview lama
  files=[];

  editId=id;
  document.getElementById("submitBtn").innerText="Update Product";

  window.scrollTo({top:0,behavior:"smooth"});
}

/* DELETE */
function deleteProduct(id){
  if(confirm("Delete produk?")){
    db.collection("products").doc(id).delete().then(()=>{
      loadProducts();
    });
  }
}

loadProducts();
</script>

</body>
</html>
