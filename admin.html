<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>

<body style="font-family:Arial; background:#111; color:white; padding:20px;">

<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk"><br><br>
<input id="price" placeholder="Harga"><br><br>
<input id="image" placeholder="Link gambar"><br><br>

<button onclick="addProduct()">Add Product</button>

<hr>

<h3>Senarai Produk</h3>
<div id="productList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order",
  storageBucket: "uniframe-order.firebasestorage.app",
  messagingSenderId: "616815976328",
  appId: "1:616815976328:web:4ba41c34762969f4f4a43d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 ADD PRODUCT
function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let image = document.getElementById("image").value;

  if(!name || !price || !image){
    alert("Isi semua field!");
    return;
  }

  db.collection("products").add({
    name: name,
    price: price,
    image: image,
    active: true
  }).then(() => {
    alert("Produk berjaya tambah!");

    // clear input
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";

    loadProducts();
  });
}

// 🔥 LOAD PRODUCT LIST
function loadProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  db.collection("products").get().then(snapshot => {
    snapshot.forEach(doc => {
      let p = doc.data();

      let div = document.createElement("div");
      div.style.border = "1px solid #555";
      div.style.padding = "10px";
      div.style.marginBottom = "10px";
      div.style.borderRadius = "10px";

      div.innerHTML = `
        <b>${p.name}</b> - RM${p.price}<br>
        <img src="${p.image}" width="120" style="margin-top:5px;"><br><br>
        <button onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

// 🔥 DELETE PRODUCT
function deleteProduct(id){
  if(confirm("Delete produk ni?")){
    db.collection("products").doc(id).delete().then(() => {
      alert("Produk deleted");
      loadProducts();
    });
  }
}

// 🔥 AUTO LOAD
loadProducts();

</script>

</body>
</html>
