<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body { font-family: Arial; background:#0f0f0f; color:white; padding:20px; }

    input {
      width:100%; padding:12px; margin:6px 0;
      border-radius:10px; border:none; background:#1f1f1f; color:white;
    }

    button {
      padding:10px 15px; border:none; border-radius:8px;
      margin:5px; cursor:pointer; font-weight:bold;
    }

    .add-btn { background:#ffcc00; color:black; }

    .upload-box {
      border:2px dashed #555; border-radius:12px;
      padding:20px; text-align:center; cursor:pointer;
    }

    #previewContainer {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .img-item {
      width:100px;
      height:100px;
      position:relative;
      cursor:grab;
    }

    .img-item img {
      width:100%; height:100%;
      object-fit:cover;
      border-radius:10px;
    }

    .progress {
      margin-top:10px;
      height:10px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
    }

    #bar {
      height:100%;
      width:0%;
      background:#ffcc00;
    }
  </style>
</head>

<body>

<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="category" placeholder="Kategori">

<div class="upload-box" id="uploadBox">
  Drag & Drop atau klik untuk pilih banyak gambar
  <input type="file" id="imageFile" multiple style="display:none;">
</div>

<div id="previewContainer"></div>

<div class="progress">
  <div id="bar"></div>
</div>

<button class="add-btn" onclick="addProduct()">Add Product</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let files = [];

// DRAG AREA
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("imageFile");
const preview = document.getElementById("previewContainer");

uploadBox.onclick = () => fileInput.click();

fileInput.onchange = e => handleFiles(e.target.files);

uploadBox.ondrop = e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

uploadBox.ondragover = e => e.preventDefault();

function handleFiles(selected){
  files = [...files, ...selected];
  renderPreview();
}

// PREVIEW + DRAG REORDER
function renderPreview(){
  preview.innerHTML = "";

  files.forEach((file, index) => {

    let div = document.createElement("div");
    div.className = "img-item";
    div.draggable = true;

    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    div.appendChild(img);

    div.ondragstart = () => div.dataset.index = index;

    div.ondrop = (e) => {
      e.preventDefault();
      let from = e.dataTransfer.getData("index");
      let to = index;

      let temp = files[from];
      files[from] = files[to];
      files[to] = temp;

      renderPreview();
    };

    div.ondragover = e => {
      e.preventDefault();
      e.dataTransfer.setData("index", index);
    };

    preview.appendChild(div);
  });
}

// COMPRESS
function compressImage(file){
  return new Promise(resolve=>{
    let img = new Image();
    let reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = ()=>{
      let canvas = document.createElement("canvas");
      let ctx = canvas.getContext("2d");

      let scale = 800 / img.width;
      canvas.width = 800;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      canvas.toBlob(blob=>resolve(blob),"image/jpeg",0.7);
    };

    reader.readAsDataURL(file);
  });
}

// ADD PRODUCT
async function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;

  if(!name || !price || !category || files.length===0){
    alert("Isi semua");
    return;
  }

  let imageUrls = [];

  for(let i=0;i<files.length;i++){

    let compressed = await compressImage(files[i]);

    let base64 = await blobToBase64(compressed);

    let formData = new FormData();
    formData.append("image", base64.split(',')[1]);

    let res = await fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4",{
      method:"POST",
      body:formData
    });

    let data = await res.json();

    imageUrls.push(data.data.url);

    document.getElementById("bar").style.width = ((i+1)/files.length*100)+"%";
  }

  db.collection("products").add({
    name, price, category, images:imageUrls
  }).then(()=>{
    alert("Done!");
    location.reload();
  });
}

// helper
function blobToBase64(blob){
  return new Promise(resolve=>{
    let reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}
</script>

</body>
</html>
