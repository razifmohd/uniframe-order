<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h2{
  margin-top:30px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  width:100%;
  background:#ffcc00;
  font-weight:bold;
}

.product, .order{
  background:#1a1a1a;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:60px;
  height:60px;
  object-fit:cover;
  margin:3px;
  border-radius:6px;
}

.delete{
  background:red;
}

.status{
  background:#333;
}
</style>
</head>

<body>

<h1>ADMIN PANEL</h1>

<!-- 🔥 ADD PRODUCT -->
<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="desc" placeholder="Description">
<input id="img1" placeholder="Link gambar 1">
<input id="img2" placeholder="Link gambar 2">

<button onclick="addProduct()">Add Product</button>

<hr>

<!-- 🔥 PRODUCT LIST -->
<h2>Produk</h2>
<div id="productList"></div>

<hr>

<!-- 🔥 ORDER LIST -->
<h2>Orders</h2>
<div id="orderList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =======================
   🔥 ADD PRODUCT
======================= */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let desc = document.getElementById("desc").value;
  let img1 = document.getElementById("img1").value;
  let img2 = document.getElementById("img2").value;

  if(!name || !price || !img1){
    alert("Isi semua");
    return;
  }

  db.collection("products").add({
    name,
    price,
    description: desc,
    images: [img1, img2]
  }).then(()=>{
    alert("Produk tambah!");
    loadProducts();
  });
}

/* =======================
   🔥 LOAD PRODUCTS
======================= */
function loadProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  db.collection("products").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let p = doc.data();

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <b>${p.name}</b> - RM${p.price}<br>
        ${p.images ? p.images.map(img=>`<img src="${img}">`).join("") : ""}
        <button class="delete" onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

/* =======================
   🔥 DELETE PRODUCT
======================= */
function deleteProduct(id){
  if(confirm("Delete produk?")){
    db.collection("products").doc(id).delete().then(()=>{
      loadProducts();
    });
  }
}

/* =======================
   🔥 LOAD ORDERS
======================= */
function loadOrders(){
  const list = document.getElementById("orderList");
  list.innerHTML = "";

  db.collection("orders").orderBy("time","desc").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let o = doc.data();

      let items = o.items.map(i=>`- ${i.name} RM${i.price}`).join("<br>");

      let div = document.createElement("div");
      div.className = "order";

      div.innerHTML = `
        <b>${o.name}</b><br>
        ${o.phone}<br>
        ${o.address}<br><br>

        ${items}<br><br>

        Total: RM${o.total}<br>
        Status: ${o.status || "pending"}<br>

        <button class="status" onclick="updateStatus('${doc.id}','paid')">Set Paid</button>
        <button class="status" onclick="updateStatus('${doc.id}','done')">Set Done</button>
      `;

      list.appendChild(div);
    });
  });
}

/* =======================
   🔥 UPDATE STATUS
======================= */
function updateStatus(id,status){
  db.collection("orders").doc(id).update({
    status: status
  }).then(()=>{
    loadOrders();
  });
}

/* =======================
   🔥 INIT
======================= */
loadProducts();
loadOrders();

</script>

</body>
</html>
