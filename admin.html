<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background:#0f0f0f;
      color:white;
      padding:20px;
    }

    input {
      width:100%;
      padding:12px;
      margin:6px 0;
      border-radius:10px;
      border:none;
      background:#1f1f1f;
      color:white;
    }

    .upload-box {
      border:2px dashed #555;
      padding:20px;
      text-align:center;
      cursor:pointer;
      border-radius:10px;
    }

    #preview img {
      width:80px;
      height:80px;
      object-fit:cover;
      margin:5px;
      border-radius:8px;
    }

    .product {
      background:#1a1a1a;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
    }

    .gallery {
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .img-box {
      position:relative;
      cursor:pointer;
    }

    .img-box img {
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:8px;
      border:2px solid #333;
    }

    .cover {
      border:3px solid lime !important;
    }

    .label {
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      background:lime;
      color:black;
      font-size:10px;
      text-align:center;
      border-radius:0 0 8px 8px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:10px;
      width:100%;
      background:#ffcc00;
      font-weight:bold;
    }

    .delete {
      background:red;
    }
  </style>
</head>

<body>

<h2>Tambah Produk</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="category" placeholder="Kategori">

<div class="upload-box" id="uploadBox">
  Klik atau drag gambar
  <input type="file" id="imageFile" multiple style="display:none;">
</div>

<div id="preview"></div>

<button onclick="addProduct()">Add Product</button>

<hr>

<h3>Senarai Produk</h3>
<div id="productList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let files = [];

const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

uploadBox.onclick = () => fileInput.click();

fileInput.onchange = e => handleFiles(e.target.files);

uploadBox.ondrop = e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

uploadBox.ondragover = e => e.preventDefault();

function handleFiles(selected){
  files = [...selected];
  preview.innerHTML = "";

  files.forEach(file=>{
    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

async function addProduct(){

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let category = document.getElementById("category").value;

  if(!name || !price || files.length===0){
    alert("Isi semua");
    return;
  }

  let imageUrls = [];

  for(let i=0;i<files.length;i++){

    let formData = new FormData();
    formData.append("image", files[i]);

    let res = await fetch("https://api.imgbb.com/1/upload?key=682bdd4f17d96ffb219da4dcc3c4b2c4",{
      method:"POST",
      body:formData
    });

    let data = await res.json();

    imageUrls.push(data.data.url);
  }

  await db.collection("products").add({
    name,
    price,
    category,
    images: imageUrls,
    coverIndex: 0 // default first image jadi cover
  });

  alert("Produk tambah!");
  location.reload();
}

// 🔥 LOAD PRODUK
function loadProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  db.collection("products").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let p = doc.data();
      let coverIndex = p.coverIndex || 0;

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <div class="gallery">
          ${p.images ? p.images.map((img, index) => `
            <div class="img-box" onclick="setCover('${doc.id}', ${index})">
              <img src="${img}" class="${index===coverIndex ? 'cover' : ''}">
              
              ${index===coverIndex ? `<div class="label">COVER</div>` : ""}
            </div>
          `).join("") : ""}
        </div>

        ${p.name} - RM${p.price}

        <button class="delete" onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

// 🔥 SET COVER
function setCover(id, index){
  db.collection("products").doc(id).update({
    coverIndex: index
  }).then(()=>{
    loadProducts();
  });
}

function deleteProduct(id){
  if(confirm("Delete produk ni?")){
    db.collection("products").doc(id).delete().then(()=>{
      loadProducts();
    });
  }
}

loadProducts();
</script>

</body>
</html>
