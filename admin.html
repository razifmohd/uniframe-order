<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>

<body style="font-family:Arial; background:#111; color:white; padding:20px;">

<h2>Tambah / Edit Produk</h2>

<input id="name" placeholder="Nama produk"><br><br>
<input id="price" placeholder="Harga"><br><br>
<input id="image" placeholder="Link gambar"><br><br>

<button onclick="addProduct()">Add Product</button>
<button onclick="updateProduct()">Update Product</button>

<hr>

<h3>Senarai Produk</h3>
<div id="productList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order",
  storageBucket: "uniframe-order.firebasestorage.app",
  messagingSenderId: "616815976328",
  appId: "1:616815976328:web:4ba41c34762969f4f4a43d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;

function addProduct(){
  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let image = document.getElementById("image").value;

  if(!name || !price || !image){
    alert("Isi semua field!");
    return;
  }

  db.collection("products").add({
    name, price, image, active: true
  }).then(() => {
    alert("Produk tambah!");
    clearForm();
    loadProducts();
  });
}

function loadProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  db.collection("products").get().then(snapshot => {
    snapshot.forEach(doc => {
      let p = doc.data();

      let div = document.createElement("div");
      div.style.border = "1px solid #555";
      div.style.padding = "10px";
      div.style.marginBottom = "10px";

      div.innerHTML = `
        <b>${p.name}</b> - RM${p.price}<br>
        <img src="${p.image}" width="120"><br><br>
        <button onclick="editProduct('${doc.id}', '${p.name}', ${p.price}, '${p.image}')">Edit</button>
        <button onclick="deleteProduct('${doc.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

function deleteProduct(id){
  if(confirm("Delete produk ni?")){
    db.collection("products").doc(id).delete().then(() => {
      loadProducts();
    });
  }
}

function editProduct(id, name, price, image){
  editId = id;

  document.getElementById("name").value = name;
  document.getElementById("price").value = price;
  document.getElementById("image").value = image;

  alert("Edit mode ON");
}

function updateProduct(){
  if(!editId){
    alert("Klik EDIT dulu!");
    return;
  }

  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let image = document.getElementById("image").value;

  db.collection("products").doc(editId).update({
    name, price, image
  }).then(() => {
    alert("Updated!");
    editId = null;
    clearForm();
    loadProducts();
  });
}

function clearForm(){
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
}

loadProducts();
</script>

</body>
</html>
