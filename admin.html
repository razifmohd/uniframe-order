<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniframe Order</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .product {
      background: #1a1a1a;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .slider {
      position: relative;
    }

    .slider img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
    }

    .slider button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .prev { left: 5px; }
    .next { right: 5px; }

    button {
      background: #ffcc00;
      border: none;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }

    .checkout {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 15px;
    }
  </style>
</head>

<body>

<div class="header">Uniframe</div>

<div id="products"></div>

<div class="checkout">
  Total: RM<span id="total">0</span>
  <button onclick="checkout()">Order via WhatsApp</button>
</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout(){
  let message = "Order:\n";

  cart.forEach(item => {
    message += "- " + item.name + " RM" + item.price + "\n";
  });

  message += "\nTotal: RM" + total;

  let phone = "60179891664";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

// 🔥 LOAD PRODUCTS
function loadProducts(){

  const container = document.getElementById("products");
  container.innerHTML = "";

  db.collection("products").get().then(snapshot => {

    snapshot.forEach(doc => {
      let p = doc.data();

      let images = p.images || [p.image];
      let currentIndex = 0;

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <div class="slider">
          <button class="prev">‹</button>
          <img src="${images[0]}" class="slide-img">
          <button class="next">›</button>
        </div>

        <h3>${p.name}</h3>
        <p style="opacity:0.7;">${p.category || ""}</p>
        <p style="font-weight:bold;">RM${p.price}</p>

        <button onclick="add('${p.name}',${p.price})">Add</button>
      `;

      let img = div.querySelector(".slide-img");
      let prev = div.querySelector(".prev");
      let next = div.querySelector(".next");

      prev.onclick = () => {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        img.src = images[currentIndex];
      };

      next.onclick = () => {
        currentIndex = (currentIndex + 1) % images.length;
        img.src = images[currentIndex];
      };

      container.appendChild(div);
    });

  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order",
  storageBucket: "uniframe-order.firebasestorage.app",
  messagingSenderId: "616815976328",
  appId: "1:616815976328:web:4ba41c34762969f4f4a43d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

loadProducts();
</script>

</body>
</html>
