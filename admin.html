<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniframe Order</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .product {
      background: #1a1a1a;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 10px;
      background: #1a1a1a;
    }

    button {
      background: #ffcc00;
      border: none;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }

    .checkout {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 15px;
    }
  </style>
</head>

<body>

<div class="header">Uniframe</div>

<div id="products"></div>

<div class="checkout">
  Total: RM<span id="total">0</span>
  <button onclick="checkout()">Order via WhatsApp</button>
</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout(){
  let message = "Order:\n";

  cart.forEach(item => {
    message += "- " + item.name + " RM" + item.price + "\n";
  });

  message += "\nTotal: RM" + total;

  let phone = "60179891664";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

// 🔥 FIX IMAGE LINK
function fixImage(url){
  if(!url) return "https://via.placeholder.com/300";

  if(url.includes("ibb.co")){
    return url.replace("https://ibb.co/", "https://i.ibb.co/");
  }

  return url;
}

// 🔥 LOAD PRODUCTS
function loadProducts(){

  const container = document.getElementById("products");
  container.innerHTML = "";

  db.collection("products").get().then(snapshot => {

    snapshot.forEach(doc => {
      let p = doc.data();

      let image = "";

      if(p.images && p.images.length > 0){
        image = fixImage(p.images[0]);
      } else if(p.image){
        image = fixImage(p.image);
      } else {
        image = "https://via.placeholder.com/300";
      }

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <img src="${image}">

        <h3>${p.name}</h3>
        <p style="opacity:0.7;">${p.category || ""}</p>
        <p style="font-weight:bold;">RM${p.price}</p>

        <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
      `;

      container.appendChild(div);
    });

  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order",
  storageBucket: "uniframe-order.firebasestorage.app",
  messagingSenderId: "616815976328",
  appId: "1:616815976328:web:4ba41c34762969f4f4a43d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

loadProducts();
</script>

</body>
</html>
