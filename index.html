<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniframe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  padding:16px;
  text-align:center;
  background:#000;
  font-weight:bold;
}

#products{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

@media(min-width:600px){
  #products{
    grid-template-columns:repeat(2,1fr);
    max-width:700px;
    margin:auto;
  }
}

.product{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.slider{
  overflow:hidden;
  position:relative;
  aspect-ratio:1/1;
}

.slides{
  display:flex;
  transition:0.3s;
}

.slides img{
  width:100%;
  object-fit:cover;
  cursor:pointer;
}

.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  display:inline-block;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:#ffcc00;
}

.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img{
  width:100%;
  max-width:600px;
}

.info{
  padding:12px;
}

button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:8px;
}

.checkout{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">Uniframe</div>
<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button>Checkout</button>
</div>

<div class="zoom" id="zoomBox">
  <img id="zoomImg">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let total=0;

db.collection("products").get().then(snapshot=>{
  const container=document.getElementById("products");

  snapshot.forEach(doc=>{
    let p=doc.data();
    let id=doc.id;
    let images=p.images || [];

    let div=document.createElement("div");
    div.className="product";

    // SLIDES
    let slides=document.createElement("div");
    slides.className="slides";
    slides.id="slides-"+id;

    images.forEach(img=>{
      let image=document.createElement("img");
      image.src=img;

      // 🔥 SAFE CLICK
      image.addEventListener("click",()=>{
        openZoom(img);
      });

      slides.appendChild(image);
    });

    let slider=document.createElement("div");
    slider.className="slider";
    slider.appendChild(slides);

    // DOTS
    let dots=document.createElement("div");
    dots.className="dots";
    dots.id="dots-"+id;

    images.forEach((_,i)=>{
      let d=document.createElement("span");
      d.className="dot"+(i===0?" active":"");
      dots.appendChild(d);
    });

    slider.appendChild(dots);

    // SWIPE
    slider.addEventListener("touchstart",e=>startSwipe(e,id));
    slider.addEventListener("touchmove",e=>moveSwipe(e,id));
    slider.addEventListener("touchend",()=>endSwipe(id));

    // INFO
    let info=document.createElement("div");
    info.className="info";
    info.innerHTML=`
      <b>${p.name}</b><br>
      RM${p.price}<br><br>
    `;

    let btn=document.createElement("button");
    btn.innerText="Add";

    btn.addEventListener("click",(e)=>{
      add(p.name,p.price,e);
    });

    info.appendChild(btn);

    div.appendChild(slider);
    div.appendChild(info);

    container.appendChild(div);
  });
});

/* swipe */
let swipeData={};

function startSwipe(e,id){
  swipeData[id]={startX:e.touches[0].clientX,index:swipeData[id]?.index||0};
}

function moveSwipe(e,id){
  let data=swipeData[id];
  let diff=e.touches[0].clientX-data.startX;

  let slides=document.getElementById("slides-"+id);
  slides.style.transform=`translateX(${diff - data.index*100}%)`;
}

function endSwipe(id){
  let data=swipeData[id];
  let slides=document.getElementById("slides-"+id);
  let dots=document.getElementById("dots-"+id).children;

  let match = slides.style.transform.match(/-?\d+/);
  let diff = match ? parseInt(match[0]) : 0;

  if(diff<-50) data.index++;
  if(diff>50) data.index--;

  let max=slides.children.length-1;
  if(data.index<0) data.index=0;
  if(data.index>max) data.index=max;

  slides.style.transform=`translateX(-${data.index*100}%)`;

  for(let i=0;i<dots.length;i++){
    dots[i].classList.remove("active");
  }
  if(dots[data.index]) dots[data.index].classList.add("active");

  swipeData[id]=data;
}

/* zoom */
const zoomBox=document.getElementById("zoomBox");
const zoomImg=document.getElementById("zoomImg");

function openZoom(src){
  zoomImg.src=src;
  zoomBox.style.display="flex";
}

zoomBox.addEventListener("click",()=>{
  zoomBox.style.display="none";
});

/* cart */
function add(name,price){
  total+=price;
  document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
