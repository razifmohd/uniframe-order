<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniframe Order</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      background: #000;
      border-bottom: 1px solid #222;
    }

    .container {
      padding-bottom: 100px;
    }

    .product {
      background: #1a1a1a;
      margin: 12px;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .product:hover {
      transform: scale(1.02);
    }

    .product h3 {
      margin: 0 0 5px;
      font-size: 18px;
    }

    .price {
      color: #ffcc00;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      background: linear-gradient(135deg, #ffcc00, #ffaa00);
      border: none;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .checkout {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 15px;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .checkout span {
      font-size: 18px;
      font-weight: bold;
    }

    .checkout button {
      width: auto;
      padding: 10px 18px;
    }

    #checkoutForm {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 15px;
      border-top: 2px solid #ffcc00;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    .cancel-btn {
      background: #444;
    }
  </style>
</head>

<body>

<div class="header">Uniframe</div>

<div class="container" id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- FORM -->
<div id="checkoutForm">
  <h3>Maklumat Customer</h3>

  <input id="custName" placeholder="Nama">
  <input id="custPhone" placeholder="No Phone">
  <textarea id="custAddress" placeholder="Alamat"></textarea>

  <button onclick="submitOrder()">Confirm Order</button>
  <button class="cancel-btn" onclick="closeForm()">Cancel</button>
</div>

<script>
let cart = [];
let total = 0;

const products = [
  {name:"Frame Allah A2", price:50},
  {name:"Acrylic Bismillah", price:80}
];

const container = document.getElementById("products");

products.forEach(p=>{
  let div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <h3>${p.name}</h3>
    <div class="price">RM${p.price}</div>
    <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
  `;
  container.appendChild(div);
});

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout(){
  document.getElementById("checkoutForm").style.display = "block";
}

function closeForm(){
  document.getElementById("checkoutForm").style.display = "none";
}

function submitOrder(){

  let name = document.getElementById("custName").value;
  let phoneUser = document.getElementById("custPhone").value;
  let address = document.getElementById("custAddress").value;

  if(!name || !phoneUser || !address){
    alert("Sila isi semua maklumat");
    return;
  }

  let message = "ORDER BARU\n\n";

  message += "Nama: " + name + "\n";
  message += "Phone: " + phoneUser + "\n";
  message += "Alamat: " + address + "\n\n";

  message += "Item:\n";

  cart.forEach(item => {
    message += "- " + item.name + " RM" + item.price + "\n";
  });

  message += "\nTotal: RM" + total;

  db.collection("orders").add({
    name: name,
    phone: phoneUser,
    address: address,
    items: cart,
    total: total,
    status: "pending",
    time: new Date()
  });

  let phone = "60179891664";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");

  cart = [];
  total = 0;
  document.getElementById("total").innerText = 0;

  document.getElementById("checkoutForm").style.display = "none";
}
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</body>
</html>
