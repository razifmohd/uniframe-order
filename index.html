<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniframe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  padding:16px;
  text-align:center;
  background:#000;
  font-weight:bold;
}

/* GRID */
#products{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

@media(min-width:600px){
  #products{
    grid-template-columns:repeat(2,1fr);
    max-width:700px;
    margin:auto;
  }
}

.product{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

/* SLIDER */
.slider{
  overflow:hidden;
  position:relative;
  aspect-ratio:1/1;
  touch-action:pan-y;
}

.slides{
  display:flex;
  transition:transform 0.35s ease;
}

.slides img{
  width:100%;
  flex-shrink:0;
  object-fit:cover;
}

/* DOTS */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  display:inline-block;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:#ffcc00;
}

/* ZOOM */
.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.zoom img{
  width:100%;
  max-width:700px;
  transition:transform 0.2s;
}

/* INFO */
.info{
  padding:12px;
}

button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:8px;
}

.checkout{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">Uniframe</div>
<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button>Checkout</button>
</div>

<div class="zoom" id="zoomBox">
  <img id="zoomImg">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let total=0;

db.collection("products").get().then(snapshot=>{
  const container=document.getElementById("products");

  snapshot.forEach(doc=>{
    let p=doc.data();
    let id=doc.id;
    let images=p.images || [];

    let div=document.createElement("div");
    div.className="product";

    let slider=document.createElement("div");
    slider.className="slider";

    let slides=document.createElement("div");
    slides.className="slides";

    images.forEach(img=>{
      let im=document.createElement("img");
      im.src=img;

      im.onclick=()=>openZoom(img);

      slides.appendChild(im);
    });

    slider.appendChild(slides);

    let dots=document.createElement("div");
    dots.className="dots";

    images.forEach((_,i)=>{
      let d=document.createElement("span");
      d.className="dot"+(i===0?" active":"");
      dots.appendChild(d);
    });

    slider.appendChild(dots);

    /* 🔥 SWIPE ENGINE */
    let index=0,startX=0,currentX=0,isDragging=false;

    slider.addEventListener("touchstart",e=>{
      isDragging=true;
      startX=e.touches[0].clientX;
      slides.style.transition="none";
    });

    slider.addEventListener("touchmove",e=>{
      if(!isDragging) return;
      currentX=e.touches[0].clientX-startX;
      slides.style.transform=`translateX(${currentX - index*slider.offsetWidth}px)`;
    });

    slider.addEventListener("touchend",()=>{
      isDragging=false;

      if(currentX<-50) index++;
      if(currentX>50) index--;

      if(index<0) index=0;
      if(index>=images.length) index=images.length-1;

      slides.style.transition="transform 0.35s ease";
      slides.style.transform=`translateX(-${index*100}%)`;

      // update dots
      dots.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));
      if(dots.children[index]) dots.children[index].classList.add("active");

      currentX=0;
    });

    let info=document.createElement("div");
    info.className="info";
    info.innerHTML=`
      <b>${p.name}</b><br>
      RM${p.price}<br><br>
    `;

    let btn=document.createElement("button");
    btn.innerText="Add";
    btn.onclick=()=>add(p.name,p.price);

    info.appendChild(btn);

    div.appendChild(slider);
    div.appendChild(info);

    container.appendChild(div);
  });
});

/* ZOOM + PINCH */
let scale=1;

function openZoom(src){
  zoomImg.src=src;
  zoomBox.style.display="flex";
  scale=1;
  zoomImg.style.transform="scale(1)";
}

zoomBox.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    let dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );

    scale=Math.min(Math.max(dist/200,1),3);
    zoomImg.style.transform=`scale(${scale})`;
  }
});

zoomBox.onclick=()=>zoomBox.style.display="none";

/* CART */
function add(name,price){
  total+=price;
  document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
