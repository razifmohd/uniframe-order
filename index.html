<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniframe Order</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      background: #000;
      border-bottom: 1px solid #222;
    }

    .product {
      background: #1a1a1a;
      margin: 12px;
      padding: 18px;
      border-radius: 14px;
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .price {
      color: #ffcc00;
      font-weight: bold;
    }

    button {
      background: #ffcc00;
      border: none;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }

    .checkout {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    #checkoutForm {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<div class="header">Uniframe</div>

<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button onclick="checkout()">Checkout</button>
</div>

<div id="checkoutForm">
  <h3>Maklumat Customer</h3>
  <input id="custName" placeholder="Nama">
  <input id="custPhone" placeholder="No Phone">
  <textarea id="custAddress" placeholder="Alamat"></textarea>
  <button onclick="submitOrder()">Confirm</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let total = 0;

// 🔥 LOAD PRODUK DARI FIREBASE
db.collection("products").get().then(snapshot => {
  const container = document.getElementById("products");

  snapshot.forEach(doc => {
    let p = doc.data();

    let image = "";

    if(p.images && p.images.length > 0){
      let index = p.coverIndex || 0;
      image = p.images[index];
    } else {
      image = "https://via.placeholder.com/300";
    }

    let div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${image}">
      <h3>${p.name}</h3>
      <div class="price">RM${p.price}</div>
      <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
    `;

    container.appendChild(div);
  });
});

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout(){
  document.getElementById("checkoutForm").style.display = "block";
}

function submitOrder(){
  let name = document.getElementById("custName").value;
  let phone = document.getElementById("custPhone").value;
  let address = document.getElementById("custAddress").value;

  if(!name || !phone || !address){
    alert("Isi semua");
    return;
  }

  db.collection("orders").add({
    name, phone, address, items: cart, total
  });

  window.open("https://wa.me/60179891664");

  cart = [];
  total = 0;
  document.getElementById("total").innerText = 0;
}
</script>

</body>
</html>
