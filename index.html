<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniframe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  padding:16px;
  text-align:center;
  background:#000;
  font-weight:bold;
}

/* 🔥 GRID */
#products{
  display:grid;
  grid-template-columns: 1fr;
  gap:12px;
  padding:12px;
}

@media(min-width:600px){
  #products{
    grid-template-columns: repeat(2,1fr);
    max-width:700px;
    margin:auto;
  }
}

.product{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* 🔥 SLIDER */
.slider{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  cursor:pointer;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.3s;
}

.slide.active{
  opacity:1;
}

/* indicator dots */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
}

.dot{
  display:inline-block;
  width:6px;
  height:6px;
  margin:0 2px;
  background:#aaa;
  border-radius:50%;
}

.dot.active{
  background:#ffcc00;
}

.info{
  padding:12px;
}

.title{
  font-size:16px;
  font-weight:bold;
}

.price{
  color:#ffcc00;
  margin:6px 0;
  font-weight:bold;
}

.desc{
  font-size:13px;
  color:#ccc;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

/* checkout */
.checkout{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">Uniframe</div>

<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button onclick="checkout()">Checkout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let cart=[];
let total=0;

/* 🔥 LOAD PRODUK */
db.collection("products").get().then(snapshot=>{
  const container=document.getElementById("products");
  container.innerHTML = ""; // 🔥 clear dulu

  snapshot.forEach(doc=>{
    let p=doc.data();

    let slides="";
    let dots="";

    if(p.images && p.images.length>0){
      slides=p.images.map((img,i)=>`
        <img src="${img}" class="slide ${i===0?'active':''}">
      `).join("");

      dots=p.images.map((_,i)=>`
        <span class="dot ${i===0?'active':''}"></span>
      `).join("");
    }

    let div=document.createElement("div");
    div.className="product";

    div.innerHTML=`
      <div class="slider" onclick="nextSlide(this)">
        ${slides}
        <div class="dots">${dots}</div>
      </div>

      <div class="info">
        <div class="title">${p.name || ''}</div>
        <div class="price">RM${p.price || 0}</div>
        <div class="desc">${p.description || ''}</div>
        <button onclick="add('${p.name}',${p.price})">Add</button>
      </div>
    `;

    container.appendChild(div);
  });
});

/* 🔥 SLIDE FUNCTION */
function nextSlide(el){
  let slides=el.querySelectorAll(".slide");
  let dots=el.querySelectorAll(".dot");
  let current=0;

  slides.forEach((s,i)=>{
    if(s.classList.contains("active")){
      s.classList.remove("active");
      dots[i].classList.remove("active");
      current=i;
    }
  });

  let next=(current+1)%slides.length;
  slides[next].classList.add("active");
  dots[next].classList.add("active");
}

/* CART */
function add(name,price){
  cart.push({name,price});
  total+=price;
  document.getElementById("total").innerText=total;
}

function checkout(){
  alert("Next kita sambung WhatsApp + detail order 🔥");
}
</script>

</body>
</html>
