<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniframe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  padding:16px;
  text-align:center;
  background:#000;
  font-weight:bold;
}

#products{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

@media(min-width:600px){
  #products{
    grid-template-columns:repeat(2,1fr);
    max-width:700px;
    margin:auto;
  }
}

.product{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.slider{
  overflow:hidden;
  position:relative;
  aspect-ratio:1/1;
}

.slides{
  display:flex;
  width:100%;
  height:100%;
  transition:0.3s;
}

.slides img{
  width:100%;
  height:100%;
  object-fit:cover;
  flex-shrink:0;
}

/* dots */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  display:inline-block;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:#ffcc00;
}

/* zoom modal */
.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.zoom img{
  width:100%;
  max-width:600px;
}

.info{
  padding:12px;
}

button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:8px;
}

.checkout{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">Uniframe</div>
<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button>Checkout</button>
</div>

<!-- zoom modal -->
<div class="zoom" id="zoomBox" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let cart=[];
let total=0;

db.collection("products").get().then(snapshot=>{
  const container=document.getElementById("products");

  snapshot.forEach(doc=>{
    let p=doc.data();

    let images=p.images || [];

    let slidesHTML=images.map(img=>`
      <img src="${img}" onclick="openZoom('${img}')">
    `).join("");

    let dotsHTML=images.map((_,i)=>`
      <span class="dot ${i===0?'active':''}"></span>
    `).join("");

    let div=document.createElement("div");
    div.className="product";

    div.innerHTML=`
      <div class="slider"
        ontouchstart="startSwipe(event,this)"
        ontouchmove="moveSwipe(event,this)"
        ontouchend="endSwipe(this)">
        
        <div class="slides">
          ${slidesHTML}
        </div>

        <div class="dots">${dotsHTML}</div>
      </div>

      <div class="info">
        <b>${p.name}</b><br>
        RM${p.price}<br><br>
        <button onclick="add('${p.name}',${p.price})">Add</button>
      </div>
    `;

    container.appendChild(div);
  });
});

/* 🔥 SWIPE SMOOTH */
let startX=0;
let currentIndex=0;

function startSwipe(e,el){
  startX=e.touches[0].clientX;
  el.style.transition="none";
}

function moveSwipe(e,el){
  let moveX=e.touches[0].clientX;
  let diff=moveX-startX;

  let slides=el.querySelector(".slides");
  slides.style.transform=`translateX(${diff - currentIndex*100}%)`;
}

function endSwipe(el){
  let slides=el.querySelector(".slides");
  slides.style.transition="0.3s";

  let width=el.offsetWidth;
  let moved=slides.style.transform.match(/-?\d+/);

  if(moved){
    let value=parseInt(moved[0]);
    if(value < -50) currentIndex++;
    if(value > 50) currentIndex--;
  }

  if(currentIndex<0) currentIndex=0;

  let totalSlides=slides.children.length;
  if(currentIndex>=totalSlides) currentIndex=totalSlides-1;

  slides.style.transform=`translateX(-${currentIndex*100}%)`;
}

/* 🔥 ZOOM */
function openZoom(src){
  document.getElementById("zoomImg").src=src;
  document.getElementById("zoomBox").style.display="flex";
}

function closeZoom(){
  document.getElementById("zoomBox").style.display="none";
}

/* CART */
function add(name,price){
  cart.push({name,price});
  total+=price;
  document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
