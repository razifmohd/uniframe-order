<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniframe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  padding:16px;
  text-align:center;
  background:#000;
  font-weight:bold;
}

#products{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

@media(min-width:600px){
  #products{
    grid-template-columns:repeat(2,1fr);
    max-width:700px;
    margin:auto;
  }
}

.product{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

/* slider */
.slider{
  overflow:hidden;
  position:relative;
  aspect-ratio:1/1;
}

.slides{
  display:flex;
  transition:0.3s;
}

.slides img{
  width:100%;
  object-fit:cover;
}

/* dots */
.dots{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  display:inline-block;
  border-radius:50%;
  margin:2px;
}

.dot.active{
  background:#ffcc00;
}

/* zoom */
.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img{
  width:100%;
  max-width:600px;
}

/* cart animation */
.cart-fly{
  position:fixed;
  width:40px;
  height:40px;
  border-radius:50%;
  z-index:999;
  pointer-events:none;
}

.info{
  padding:12px;
}

button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:8px;
}

.checkout{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">Uniframe</div>
<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button>Checkout</button>
</div>

<div class="zoom" id="zoomBox" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain:"uniframe-order.firebaseapp.com",
  projectId:"uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let cart=[];
let total=0;

db.collection("products").get().then(snapshot=>{
  const container=document.getElementById("products");

  snapshot.forEach(doc=>{
    let p=doc.data();
    let id=doc.id;

    let images=p.images || [];

    let slidesHTML=images.map(img=>`
      <img src="${img}" onclick="openZoom('${img}')">
    `).join("");

    let dotsHTML=images.map((_,i)=>`
      <span class="dot ${i===0?'active':''}"></span>
    `).join("");

    let div=document.createElement("div");
    div.className="product";

    div.innerHTML=`
      <div class="slider"
        ontouchstart="startSwipe(event,'${id}')"
        ontouchmove="moveSwipe(event,'${id}')"
        ontouchend="endSwipe('${id}')">

        <div class="slides" id="slides-${id}">
          ${slidesHTML}
        </div>

        <div class="dots" id="dots-${id}">
          ${dotsHTML}
        </div>
      </div>

      <div class="info">
        <b>${p.name}</b><br>
        RM${p.price}<br><br>
        <button onclick="add('${p.name}',${p.price},event)">Add</button>
      </div>
    `;

    container.appendChild(div);
  });
});

/* swipe per product */
let swipeData={};

function startSwipe(e,id){
  swipeData[id]={startX:e.touches[0].clientX,index:swipeData[id]?.index||0};
}

function moveSwipe(e,id){
  let data=swipeData[id];
  let diff=e.touches[0].clientX-data.startX;

  let slides=document.getElementById("slides-"+id);
  slides.style.transform=`translateX(${diff - data.index*100}%)`;
}

function endSwipe(id){
  let data=swipeData[id];
  let slides=document.getElementById("slides-"+id);
  let dots=document.getElementById("dots-"+id").children;

  let diff=parseInt(slides.style.transform.match(/-?\d+/))||0;

  if(diff<-50) data.index++;
  if(diff>50) data.index--;

  let max=slides.children.length-1;
  if(data.index<0) data.index=0;
  if(data.index>max) data.index=max;

  slides.style.transform=`translateX(-${data.index*100}%)`;

  for(let i=0;i<dots.length;i++){
    dots[i].classList.remove("active");
  }
  dots[data.index].classList.add("active");

  swipeData[id]=data;
}

/* zoom */
function openZoom(src){
  zoomImg.src=src;
  zoomBox.style.display="flex";
}
function closeZoom(){
  zoomBox.style.display="none";
}

/* cart animation */
function add(name,price,e){
  total+=price;
  document.getElementById("total").innerText=total;

  let img=e.target.closest(".product").querySelector("img");

  let clone=img.cloneNode();
  clone.className="cart-fly";
  clone.style.left=img.getBoundingClientRect().left+"px";
  clone.style.top=img.getBoundingClientRect().top+"px";

  document.body.appendChild(clone);

  setTimeout(()=>{
    clone.style.left="90%";
    clone.style.top="95%";
    clone.style.transform="scale(0.2)";
  },10);

  setTimeout(()=>clone.remove(),600);
}
</script>

</body>
</html>
