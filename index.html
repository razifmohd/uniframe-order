<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniframe Order</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      background: #000;
      border-bottom: 1px solid #222;
      text-align: center;
    }

    /* 🔥 GRID */
    #products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
      padding-bottom: 100px;
      max-width: 600px;
      margin: auto;
    }

    .product {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    /* 🔥 GAMBAR 1:1 FIX */
    .product img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .info {
      padding: 10px;
    }

    .info h3 {
      margin: 0;
      font-size: 14px;
    }

    .price {
      color: #ffcc00;
      font-weight: bold;
      font-size: 14px;
      margin: 5px 0;
    }

    button {
      background: #ffcc00;
      border: none;
      padding: 8px;
      border-radius: 8px;
      width: 100%;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .checkout {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #checkoutForm {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<div class="header">Uniframe</div>

<div id="products"></div>

<div class="checkout">
  <span>Total: RM<span id="total">0</span></span>
  <button onclick="checkout()">Checkout</button>
</div>

<div id="checkoutForm">
  <h3>Maklumat Customer</h3>
  <input id="custName" placeholder="Nama">
  <input id="custPhone" placeholder="No Phone">
  <textarea id="custAddress" placeholder="Alamat"></textarea>
  <button onclick="submitOrder()">Confirm</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCTH6uXY-ksrOJ0HnLN3l6tCeF1wqojhI",
  authDomain: "uniframe-order.firebaseapp.com",
  projectId: "uniframe-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let total = 0;

// 🔥 LOAD PRODUK
db.collection("products").get().then(snapshot => {
  const container = document.getElementById("products");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    let p = doc.data();

    let image = "";

    if(p.images && p.images.length > 0){
      let index = p.coverIndex || 0;
      image = p.images[index];
    } else if(p.image){
      image = p.image;
    } else {
      image = "https://via.placeholder.com/300";
    }

    let div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${image}">
      <div class="info">
        <h3>${p.name || "No Name"}</h3>
        <div class="price">RM${p.price || 0}</div>
        <button onclick="add('${p.name}',${p.price})">Add</button>
      </div>
    `;

    container.appendChild(div);
  });
});

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout(){
  document.getElementById("checkoutForm").style.display = "block";
}

function submitOrder(){
  let name = document.getElementById("custName").value;
  let phone = document.getElementById("custPhone").value;
  let address = document.getElementById("custAddress").value;

  if(!name || !phone || !address){
    alert("Isi semua");
    return;
  }

  db.collection("orders").add({
    name, phone, address, items: cart, total
  });

  let msg = `Order baru\nNama: ${name}\nPhone: ${phone}\nTotal: RM${total}`;
  window.open("https://wa.me/60179891664?text=" + encodeURIComponent(msg));

  cart = [];
  total = 0;
  document.getElementById("total").innerText = 0;
}
</script>

</body>
</html>
